<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول · لوحة الأدمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{
            background:linear-gradient(145deg,#eef5f8 0%,#deeef7 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:1.5rem;
        }
        .login-wrap{width:100%;max-width:420px;}
        .login-logo{text-align:center;margin-bottom:2rem;}
        .login-logo .hand{font-size:3.5rem;display:block;margin-bottom:0.5rem;}
        .login-logo h1{color:#1a3b5d;font-size:2rem;font-weight:900;}
        .login-logo p{color:#36748b;font-size:1rem;}

        .login-card{
            background:white;
            border-radius:40px;
            padding:2.5rem;
            box-shadow:0 30px 60px -20px rgba(15,70,90,0.25);
            border:1px solid rgba(210,235,245,0.7);
        }

        .flash{
            padding:12px 16px;
            border-radius:12px;
            font-weight:600;
            margin-bottom:16px;
            font-size:0.95rem;
        }
        .flash-danger{background:#fde8e8;color:#7b1c1c;border-right:4px solid #e53e3e;}
        .flash-success{background:#d4edda;color:#1a5c2e;border-right:4px solid #2f8f7a;}

        .form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:1.2rem;}
        .form-group label{font-weight:700;color:#1a3b5d;font-size:1rem;}
        .form-group input{
            padding:0.9rem 1.2rem;
            border:2px solid #d1e2ef;
            border-radius:40px;
            font-size:1rem;
            font-family:'Cairo',sans-serif;
            transition:border-color 0.2s;
            background:#f8fcff;
        }
        .form-group input:focus{outline:none;border-color:#2f8f7a;background:white;}

        .submit-btn{
            width:100%;
            background:linear-gradient(45deg,#1a3b5d,#2f8f7a);
            color:white;
            font-weight:700;
            font-size:1.1rem;
            padding:1rem;
            border:none;
            border-radius:40px;
            cursor:pointer;
            transition:all 0.3s;
            font-family:'Cairo',sans-serif;
            margin-top:0.5rem;
        }
        .submit-btn:hover{transform:scale(1.03);box-shadow:0 0 25px rgba(47,143,122,0.4);}

        .back-site{
            display:block;
            text-align:center;
            margin-top:1.5rem;
            color:#2f8f7a;
            font-weight:600;
            text-decoration:none;
        }
        .back-site:hover{color:#1a3b5d;}
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-logo">
        <img src="/static/img/logo.jpg" style="width:45px;height:45px;object-fit:contain;" alt="logo">
        <h1>العطاء</h1>
        <p>لوحة تحكم المشرفين</p>
    </div>
    <div class="login-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
            <div class="flash flash-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" name="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">دخول ←</button>
        </form>
    </div>
    <a href="{{ url_for('index') }}" class="back-site">← العودة للموقع</a>
</div>
</body>
</html>
