<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بنك الزكاة - منصة العطاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* التنسيق العام (نفس ستايل المنصة الموحد) */
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; direction: rtl; }
        .charity-container { max-width: 1000px; margin: auto; background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .logo-circle { width: 80px; height: 80px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .campaign-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .campaign-card { border: 1px solid #e0e0e0; border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s; }
        .campaign-card:hover { border-color: #2f8f7a; transform: translateY(-5px); }
        .btn-donate { background: #2f8f7a; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .price-tag { font-size: 1.5rem; color: #2f8f7a; font-weight: 800; display: block; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="charity-container">
        <div class="header">
            <div class="logo-circle">💰</div>
            <div>
                <h1>بنك الزكاة المصري</h1>
                <p>تحت إشراف مشيخة الأزهر الشريف</p>
            </div>
        </div>

        <h3 style="margin-bottom: 20px; color: #1a3b5d;">اختر حملة التبرع:</h3>
        <div class="campaign-grid">
            <div class="campaign-card">
                <h4>زكاة المال</h4>
                <p>توجيه أموال الزكاة لمصارفها الشرعية الثمانية</p>
                <span class="price-tag">حسب المقدار</span>
                <input type="number" placeholder="أدخل المبلغ" style="width: 80%; padding: 8px; border-radius: 10px; border: 1px solid #ddd;">
                <button class="btn-donate">تبرع الآن</button>
            </div>
            <div class="campaign-card">
                <h4>زكاة الفطر</h4>
                <p>إخراج القيمة النقدية لزكاة الفطر</p>
                <span class="price-tag">35 ج.م / فرد</span>
                <button class="btn-donate">تبرع الآن</button>
            </div>
        </div>
    </div>
</body>
</html>
