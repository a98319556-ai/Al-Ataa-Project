<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جمعية رسالة - منصة العطاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* نفس التنسيقات السابقة مع تغيير اللون المميز لرسالة */
        body { font-family: 'Cairo', sans-serif; background: #fdf2f2; margin: 0; padding: 20px; direction: rtl; }
        .charity-container { max-width: 1000px; margin: auto; background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .logo-circle { width: 80px; height: 80px; background: #ffebee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .campaign-card:hover { border-color: #d32f2f; }
        .btn-donate { background: #d32f2f; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; width: 100%; margin-top: 15px; }
        .price-tag { color: #d32f2f; font-size: 1.5rem; font-weight: 800; }
    </style>
</head>
<body>
    <div class="charity-container">
        <div class="header">
            <div class="logo-circle">✉️</div>
            <div>
                <h1>جمعية رسالة للأعمال الخيرية</h1>
                <p>مساعدة آلاف الأسر المحتاجة في كل محافظات مصر</p>
            </div>
        </div>

        <h3 style="margin-bottom: 20px;">حملاتنا الحالية:</h3>
        <div class="campaign-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
            <div class="campaign-card" style="border: 1px solid #eee; border-radius: 20px; padding: 20px; text-align: center;">
                <h4>إطعام مسكين</h4>
                <p>توصيل وجبات ساخنة للأسر الأكثر احتياجاً</p>
                <span class="price-tag">50 ج.م / وجبة</span>
                <button class="btn-donate">تبرع الآن</button>
            </div>
            <div class="campaign-card" style="border: 1px solid #eee; border-radius: 20px; padding: 20px; text-align: center;">
                <h4>تجهيز عرائس</h4>
                <p>المساهمة في شراء أجهزة كهربائية لليتيمات</p>
                <span class="price-tag">سهم بـ 500 ج.م</span>
                <button class="btn-donate">تبرع الآن</button>
            </div>
        </div>
    </div>
</body>
</html>
