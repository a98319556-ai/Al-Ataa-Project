<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
</head>
<body>
    <h2>إضافة حملة جديدة</h2>
    <form action="/add_campaign" method="POST" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="عنوان الحملة" required><br><br>
        <textarea name="description" placeholder="الوصف"></textarea><br><br>
        
        <label>اختر الجمعية:</label>
        <select name="charity_id" required>
            {% for charity in charities %}
                <option value="{{ charity.id }}">{{ charity.name }}</option>
            {% endfor %}
        </select><br><br>

        <input type="file" name="image" required><br><br>
        <button type="submit">نشر الحملة</button>
    </form>
</body>
</html>
